version: "3.8"

services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - postgres
    environment:
      DBT_PROFILES_DIR: /workspace/.dbt

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_pass
      POSTGRES_DB: analytics
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"


